<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <meta name="robots" content="noindex" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f7f7f7;
        color: #222;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0,0,0,.08);
        text-align: center;
        max-width: 520px;
      }
      a {
        color: #0b57d0;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>404</h1>
      <p>Sorry, the page you’re looking for doesn’t exist.</p>
      <p><a href="/">Go back home</a></p>
    </main>
  </body>
</html>
